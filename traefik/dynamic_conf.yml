http:
  routers:
    auth:
      rule: "PathPrefix(`/api/auth`)"
      service: auth-service
      entryPoints:
        - web

    api:
      rule: "PathPrefix(`/api`) && !PathPrefix(`/api/auth`)"
      service: api-service
      entryPoints:
        - web

    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints:
        - web
      priority: 1

  services:
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8001"

    api-service:
      loadBalancer:
        servers:
          - url: "http://api-service:8002"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
